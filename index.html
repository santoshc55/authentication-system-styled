<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="login-container">
  <div class="login-card">

    <h3 class="text-center mb-4">Login</h3>

    <input type="email" id="email" class="form-control mb-3" placeholder="Email">
    <input type="password" id="password" class="form-control mb-3" placeholder="Password">

    <!-- Message -->
    <p id="msg" style="text-align:center;"></p>

    <button class="btn btn-login w-100" onclick="loginUser()">Login</button>

    <div class="text-center mt-3">
      <a href="forgot-password.html">Forgot Password?</a><br>
      <a href="register.html">Create Account</a>
    </div>

  </div>
</div>

<script>
function loginUser() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  let storedEmail = localStorage.getItem("email");
  let storedPassword = localStorage.getItem("password");

  if(email === "" || password === "") {
    document.getElementById("msg").innerText = "Please fill all fields ❌";
    document.getElementById("msg").style.color = "red";
    return;
  }

  if(email === storedEmail && password === storedPassword) {
    document.getElementById("msg").innerText = "Login Successful ✅";
    document.getElementById("msg").style.color = "green";

    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 1500);
  } else {
    document.getElementById("msg").innerText = "Invalid Credentials ❌";
    document.getElementById("msg").style.color = "red";
  }
}
</script>

</body>
</html>
