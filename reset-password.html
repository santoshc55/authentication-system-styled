<!DOCTYPE html>
<html>
<head>
  <title>Reset Password</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="login-container">
  <div class="login-card">

    <h3 class="text-center mb-4">Reset Password</h3>

    <input type="password" id="newpass" class="form-control mb-3" placeholder="New Password">

    <!-- Success message -->
    <p id="msg" style="color:green; text-align:center;"></p>

    <button class="btn btn-login w-100" onclick="resetPassword()">Update</button>

  </div>
</div>

<script>
function resetPassword() {
  let pass = document.getElementById("newpass").value;

  // validation
  if(pass === "") {
    alert("Please enter new password ❌");
    return;
  }

  // show success message
  document.getElementById("msg").innerText = "Password Reset Successful ✅";

  // redirect after 2 seconds
  setTimeout(() => {
    window.location.href = "index.html";
  }, 2000);
}
</script>

</body>
</html>
