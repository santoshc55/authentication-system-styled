<!DOCTYPE html>
<html>
<head>
  <title>Register</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="login-container">
  <div class="login-card">

    <h3 class="text-center mb-4">Register</h3>

    <input type="text" id="name" class="form-control mb-3" placeholder="Full Name">
    <input type="email" id="email" class="form-control mb-3" placeholder="Email">
    <input type="password" id="password" class="form-control mb-3" placeholder="Password">

    <!-- Success message -->
    <p id="msg" style="color:green; text-align:center;"></p>

    <button class="btn btn-login w-100" onclick="registerUser()">Register</button>

    <div class="text-center mt-3">
      <a href="index.html">Back to Login</a>
    </div>

  </div>
</div>
<script>
function registerUser() {
  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  if(name === "" || email === "" || password === "") {
    alert("Please fill all fields ❌");
    return;
  }

  // SAVE DATA
  localStorage.setItem("email", email);
  localStorage.setItem("password", password);

  document.getElementById("msg").innerText = "Successfully Registered ✅";

  setTimeout(() => {
    window.location.href = "index.html";
  }, 2000);
}
</script>

</body>
</html>
